<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Music Player Generator</title>
    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --primary: #1db954;
            --primary-hover: #1ed760;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--container-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 1.5rem;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 6px;
            background-color: #2a2a2a;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            background-color: var(--primary);
            color: black;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        .result-area {
            position: relative;
            background-color: #000;
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: auto;
            white-space: pre;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.5;
            text-align: left;
        }

        #copyBtn {
            width: 100%;
            background-color: #333;
            color: white;
        }

        #copyBtn:hover {
            background-color: #444;
        }

        .error {
            color: #ff4d4d;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Text Player Generator</h1>
    <div class="input-group">
        <input type="text" id="songInput" placeholder="Enter a song title (e.g., Shape of You)" onkeypress="handleKeyPress(event)">
        <button id="generateBtn" onclick="generatePlayer()">Generate</button>
    </div>
    <div id="errorMsg" class="error">Song not found. Please try another query.</div>
    
    <div class="result-area" id="resultDisplay">Your text player will appear here...</div>
    <button id="copyBtn" onclick="copyToClipboard()" disabled>Copy to Clipboard</button>
</div>

<script>
    // Converts standard numbers to subscript characters
    function toSubscript(str) {
        const subMap = {'0':'₀','1':'₁','2':'₂','3':'₃','4':'₄','5':'₅','6':'₆','7':'₇','8':'₈','9':'₉', ':': ':'};
        return str.split('').map(c => subMap[c] || c).join('');
    }

    // Formats milliseconds into mm:ss
    function formatTime(ms) {
        const totalSeconds = Math.floor(ms / 1000);
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        return `${minutes}:${seconds.toString().padStart(2, '0')}`;
    }

    // Generates the progress bar string
    function generateProgressBar(percent) {
        const barLength = 32; // Length of the line
        const dotPosition = Math.floor((percent / 100) * barLength);
        
        let bar = '';
        for (let i = 0; i < barLength; i++) {
            if (i === dotPosition) {
                bar += '⚪';
            } else {
                bar += '─';
            }
        }
        return bar;
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') generatePlayer();
    }

    async function generatePlayer() {
        const input = document.getElementById('songInput').value.trim();
        const generateBtn = document.getElementById('generateBtn');
        const resultDisplay = document.getElementById('resultDisplay');
        const copyBtn = document.getElementById('copyBtn');
        const errorMsg = document.getElementById('errorMsg');

        if (!input) return;

        // Reset UI
        generateBtn.disabled = true;
        generateBtn.innerText = 'Searching...';
        errorMsg.style.display = 'none';
        copyBtn.disabled = true;

        try {
            // Using iTunes API: Free, no key needed, supports CORS
            const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(input)}&entity=song&limit=1`);
            const data = await response.json();

            if (data.results.length === 0) {
                throw new Error("No results");
            }

            const track = data.results[0];
            const artist = track.artistName;
            const title = track.trackName;
            const durationMs = track.trackTimeMillis;

            // Generate random current time between 15% and 85% of the song
            const randomPercent = Math.floor(Math.random() * 70) + 15;
            const currentTimeMs = Math.floor(durationMs * (randomPercent / 100));

            // Format times to subscript strings
            const currentStr = toSubscript(formatTime(currentTimeMs));
            const totalStr = toSubscript(formatTime(durationMs));

            // Generate progress bar
            const progressBar = generateProgressBar(randomPercent);

            // Construct the final text art
            const textArt = 
`🎵 ${title} - ${artist}

${progressBar}

◄◄⠀▐▐ ⠀►►⠀⠀　　⠀${currentStr} / ${totalStr}　　 ──○─  ⠀　　　ᴴᴰ ⚙ ❐⊏⊐`;

            resultDisplay.innerText = textArt;
            copyBtn.disabled = false;

        } catch (error) {
            console.error(error);
            errorMsg.style.display = 'block';
            resultDisplay.innerText = 'Your text player will appear here...';
        } finally {
            generateBtn.disabled = false;
            generateBtn.innerText = 'Generate';
        }
    }

    function copyToClipboard() {
        const text = document.getElementById('resultDisplay').innerText;
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.getElementById('copyBtn');
            const originalText = btn.innerText;
            btn.innerText = 'Copied! ✨';
            btn.style.backgroundColor = '#1db954';
            btn.style.color = '#000';
            
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.backgroundColor = '#333';
                btn.style.color = 'white';
            }, 2000);
        });
    }
</script>

</body>
</html>
