<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music2Text - agrumestly.top</title>
    <link rel="stylesheet" href="css/main.css">
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Music to Text</h1>
            <p>输入歌名，生成适合发布在 Instagram 或 Twitter 的文本播放器</p>
            <div class="counter-badge">
                VIEWS: <span id="busuanzi_value_site_pv">--</span>
            </div>
        </div>

        <div class="search-box">
            <div class="input-wrapper">
                <input type="text" id="songInput" placeholder="输入歌曲名称 (例如: Love Is Here)" autocomplete="off">
                <div id="suggestions" class="suggestions-hidden"></div>
            </div>
            <button id="genBtn">生成</button>
        </div>

        <div class="style-grid" id="styleGrid">
            <div class="style-card">
                <div class="style-name">Classic Bar</div>
                <div class="display-area" id="out1">等待输入...</div>
                <button class="copy-btn" onclick="copyText('out1')">复制样式</button>
            </div>

            <div class="style-card">
                <div class="style-name">Waveform Vibe</div>
                <div class="display-area" id="out2">等待输入...</div>
                <button class="copy-btn" onclick="copyText('out2')">复制样式</button>
            </div>

            <div class="style-card">
                <div class="style-name">Minimalist One-Line</div>
                <div class="display-area" id="out3">等待输入...</div>
                <button class="copy-btn" onclick="copyText('out3')">复制样式</button>
            </div>

            <div class="style-card">
                <div class="style-name">Retro Compact</div>
                <div class="display-area" id="out4">等待输入...</div>
                <button class="copy-btn" onclick="copyText('out4')">复制样式</button>
            </div>
        </div>
        
        <footer class="footer">
            <span class="footer-emoji">🎵✨</span>
            <p>&copy; 2026 <a href="https://agrumestly.top">agrumestly.top</a>.</p>
            <p>Made by AgrumeStly. All rights reserved.</p>
            <p>Made for creators who love music. No strings attached.</p>
        </footer>
    </div>
    <script src="js/main.js"></script>
</body>

</html>
